<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#A78BFA" opacity="0.15"/>
  <circle cx="1050" cy="550" r="150" fill="#C4B5FD" opacity="0.1"/>

  <!-- 应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="#6366F1" filter="url(#shadow1)"/>
    <path d="M35 50 L70 35 L105 50 L105 90 L70 105 L35 90 Z" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="70" cy="70" r="12" fill="#fff" opacity="0.9"/>
    <text x="70" y="135" text-anchor="middle" fill="#E0E7FF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">FlowNote</text>
  </g>

  <!-- 手机界面 -->
  <g transform="translate(300, 60)" filter="url(#shadow2)">
    <rect width="220" height="380" rx="20" fill="#1F2937"/>
    <rect x="6" y="6" width="208" height="368" rx="16" fill="#FFFFFF"/>
    <!-- 状态栏 -->
    <rect x="6" y="6" width="208" height="36" rx="16" fill="url(#bg)"/>
    <text x="18" y="30" fill="#fff" font-family="system-ui, sans-serif" font-size="9">9:41</text>
    <!-- 搜索栏 -->
    <rect x="12" y="50" width="196" height="24" rx="12" fill="#F3F4F6"/>
    <text x="24" y="66" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="8">搜索你的笔记...</text>
    <!-- 分类标签 -->
    <rect x="12" y="80" width="32" height="14" rx="7" fill="#6366F1"/>
    <text x="28" y="90" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="6">全部</text>
    <rect x="48" y="80" width="32" height="14" rx="7" fill="#F3F4F6"/>
    <text x="64" y="90" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">学习</text>
    <rect x="84" y="80" width="32" height="14" rx="7" fill="#F3F4F6"/>
    <text x="100" y="90" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">工作</text>
    <!-- AI洞察 -->
    <rect x="12" y="100" width="196" height="40" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <circle cx="26" cy="112" r="6" fill="#6366F1"/>
    <text x="26" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="6">AI</text>
    <text x="36" y="116" fill="#4F46E5" font-family="system-ui, sans-serif" font-size="7" font-weight="600">今日洞察</text>
    <text x="20" y="132" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">3篇"用户增长"笔记产生新关联</text>
    <!-- 笔记卡片 -->
    <rect x="12" y="148" width="196" height="50" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="20" y="156" width="16" height="16" rx="4" fill="#6366F1" opacity="0.2"/>
    <text x="28" y="168" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="7">📄</text>
    <text x="42" y="164" fill="#111827" font-family="system-ui, sans-serif" font-size="7" font-weight="600">用户增长策略笔记</text>
    <text x="42" y="180" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">探索低成本获客渠道，分析竞品定价...</text>
    <rect x="20" y="188" width="30" height="10" rx="5" fill="#EEF2FF"/>
    <text x="35" y="196" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="5">增长</text>
    <rect x="56" y="188" width="30" height="10" rx="5" fill="#FEF3C7"/>
    <text x="71" y="196" text-anchor="middle" fill="#D97706" font-family="system-ui, sans-serif" font-size="5">定价</text>
    <!-- 笔记卡片2 -->
    <rect x="12" y="204" width="196" height="50" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="20" y="212" width="16" height="16" rx="4" fill="#10B981" opacity="0.2"/>
    <text x="28" y="224" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="7">💡</text>
    <text x="42" y="220" fill="#111827" font-family="system-ui, sans-serif" font-size="7" font-weight="600">产品灵感收集</text>
    <text x="42" y="236" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">AI助手的交互设计参考案例...</text>
    <!-- 底部导航 -->
    <rect x="18" y="332" width="184" height="28" rx="14" fill="#FFFFFF" stroke="#F3F4F6" stroke-width="1"/>
    <text x="38" y="350" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="6">首页</text>
    <text x="72" y="350" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">创建</text>
    <text x="110" y="350" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">图谱</text>
    <text x="148" y="350" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">搜索</text>
    <text x="182" y="350" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">我的</text>
  </g>

  <!-- 右侧卡片 - 知识图谱 -->
  <g transform="translate(600, 80)" filter="url(#shadow2)">
    <rect width="520" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="32" fill="#111827" font-family="system-ui, sans-serif" font-size="13" font-weight="700">知识图谱</text>
    <!-- 节点连线 -->
    <line x1="120" y1="80" x2="220" y2="120" stroke="#C7D2FE" stroke-width="2"/>
    <line x1="220" y1="120" x2="320" y2="80" stroke="#C7D2FE" stroke-width="2"/>
    <line x1="220" y1="120" x2="200" y2="180" stroke="#C7D2FE" stroke-width="2"/>
    <line x1="200" y1="180" x2="100" y2="160" stroke="#C7D2FE" stroke-width="2"/>
    <line x1="320" y1="80" x2="400" y2="140" stroke="#C7D2FE" stroke-width="1.5"/>
    <!-- 节点 -->
    <circle cx="120" cy="80" r="16" fill="#6366F1" opacity="0.2"/>
    <circle cx="120" cy="80" r="12" fill="#6366F1"/>
    <text x="120" y="84" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8">5</text>
    <circle cx="220" cy="120" r="20" fill="#8B5CF6" opacity="0.2"/>
    <circle cx="220" cy="120" r="16" fill="#8B5CF6"/>
    <text x="220" y="125" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">8</text>
    <circle cx="320" cy="80" r="14" fill="#A78BFA" opacity="0.2"/>
    <circle cx="320" cy="80" r="10" fill="#A78BFA"/>
    <text x="320" y="84" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">4</text>
    <circle cx="200" cy="180" r="18" fill="#C4B5FD" opacity="0.2"/>
    <circle cx="200" cy="180" r="14" fill="#C4B5FD"/>
    <text x="200" y="185" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9">6</text>
    <circle cx="100" cy="160" r="12" fill="#DDD6FE" opacity="0.2"/>
    <circle cx="100" cy="160" r="8" fill="#DDD6FE"/>
    <text x="100" y="164" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="6">3</text>
    <circle cx="400" cy="140" r="14" fill="#F59E0B" opacity="0.2"/>
    <circle cx="400" cy="140" r="10" fill="#F59E0B"/>
    <text x="400" y="144" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">AI</text>
    <!-- 筛选标签 -->
    <rect x="24" y="196" width="36" height="14" rx="7" fill="#6366F1"/>
    <text x="42" y="206" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="6">全部</text>
    <rect x="66" y="196" width="36" height="14" rx="7" fill="#F3F4F6"/>
    <text x="84" y="206" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">学习</text>
    <rect x="108" y="196" width="36" height="14" rx="7" fill="#F3F4F6"/>
    <text x="126" y="206" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">工作</text>
  </g>

  <!-- 右侧卡片 - AI语义搜索 -->
  <g transform="translate(600, 340)" filter="url(#shadow2)">
    <rect width="520" height="200" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="32" fill="#111827" font-family="system-ui, sans-serif" font-size="13" font-weight="700">AI 语义搜索</text>
    <rect x="24" y="44" width="472" height="32" rx="16" fill="#F3F4F6"/>
    <text x="40" y="64" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9">输入模糊概念，AI 理解你的意图...</text>
    <rect x="24" y="84" width="472" height="44" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <text x="36" y="102" fill="#4F46E5" font-family="system-ui, sans-serif" font-size="8" font-weight="600">"上周关于用户留存的讨论"</text>
    <text x="36" y="118" fill="#6B7280" font-family="system-ui, sans-serif" font-size="7">找到 3 篇相关笔记 · 语义匹配度 92%</text>
    <rect x="24" y="136" width="228" height="48" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="32" y="144" width="14" height="14" rx="3" fill="#6366F1" opacity="0.2"/>
    <text x="39" y="155" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="6">📄</text>
    <text x="52" y="152" fill="#111827" font-family="system-ui, sans-serif" font-size="7" font-weight="600">用户留存分析</text>
    <text x="52" y="168" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">匹配度 95%</text>
    <rect x="268" y="136" width="228" height="48" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="276" y="144" width="14" height="14" rx="3" fill="#10B981" opacity="0.2"/>
    <text x="283" y="155" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="6">💡</text>
    <text x="296" y="152" fill="#111827" font-family="system-ui, sans-serif" font-size="7" font-weight="600">竞品定价策略</text>
    <text x="296" y="168" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">匹配度 88%</text>
  </g>

  <text x="600" y="620" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="36" font-weight="700">FlowNote</text>
  <text x="600" y="650" text-anchor="middle" fill="#E0E7FF" font-family="system-ui, sans-serif" font-size="16">让笔记像思维一样流动</text>
</svg>
