    <!-- 标题栏 -->
    <rect width="640" height="32" rx="8" fill="#27272A"/>
    <rect y="24" width="640" height="8" fill="#27272A"/>
    <text x="16" y="22" fill="#A855F7" font-family="system-ui, sans-serif" font-size="10" font-weight="600">AI漫剧</text>
    <text x="100" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">分镜</text>
    <text x="140" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">角色</text>
    <text x="180" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">时间线</text>
    <!-- 分镜网格 3x2 -->
    <rect x="16" y="44" width="192" height="132" rx="6" fill="#09090B"/>
    <rect x="20" y="48" width="184" height="90" rx="4" fill="#A855F7" opacity="0.15"/>
    <circle cx="112" cy="90" r="16" fill="#A855F7" opacity="0.3"/>
    <text x="112" y="94" text-anchor="middle" fill="#A855F7" font-family="system-ui, sans-serif" font-size="14">01</text>
    <rect x="20" y="142" width="184" height="26" rx="4" fill="#27272A"/>
    <text x="28" y="158" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">开场 - 城市天际线</text>

    <rect x="216" y="44" width="192" height="132" rx="6" fill="#09090B"/>
    <rect x="220" y="48" width="184" height="90" rx="4" fill="#7C3AED" opacity="0.15"/>
    <circle cx="312" cy="90" r="16" fill="#7C3AED" opacity="0.3"/>
    <text x="312" y="94" text-anchor="middle" fill="#7C3AED" font-family="system-ui, sans-serif" font-size="14">02</text>
    <rect x="220" y="142" width="184" height="26" rx="4" fill="#27272A"/>
    <text x="228" y="158" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">角色登场 - 主角介绍</text>

    <rect x="416" y="44" width="208" height="132" rx="6" fill="#09090B"/>
    <rect x="420" y="48" width="200" height="90" rx="4" fill="#EC4899" opacity="0.15"/>
    <circle cx="520" cy="90" r="16" fill="#EC4899" opacity="0.3"/>
    <text x="520" y="94" text-anchor="middle" fill="#EC4899" font-family="system-ui, sans-serif" font-size="14">03</text>
    <rect x="420" y="142" width="200" height="26" rx="4" fill="#27272A"/>
    <text x="428" y="158" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">冲突 - 对峙场景</text>

    <rect x="16" y="184" width="192" height="132" rx="6" fill="#09090B"/>
    <rect x="20" y="188" width="184" height="90" rx="4" fill="#F59E0B" opacity="0.15"/>
    <circle cx="112" cy="230" r="16" fill="#F59E0B" opacity="0.3"/>
    <text x="112" y="234" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="14">04</text>
    <rect x="20" y="282" width="184" height="26" rx="4" fill="#27272A"/>
    <text x="28" y="298" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">高潮 - 战斗场面</text>

    <rect x="216" y="184" width="192" height="132" rx="6" fill="#09090B"/>
    <rect x="220" y="188" width="184" height="90" rx="4" fill="#06B6D4" opacity="0.15"/>
    <circle cx="312" cy="230" r="16" fill="#06B6D4" opacity="0.3"/>
    <text x="312" y="234" text-anchor="middle" fill="#06B6D4" font-family="system-ui, sans-serif" font-size="14">05</text>
    <rect x="220" y="282" width="184" height="26" rx="4" fill="#27272A"/>
    <text x="228" y="298" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">转折 - 真相揭示</text>

    <rect x="416" y="184" width="208" height="132" rx="6" fill="#09090B"/>
    <rect x="420" y="188" width="200" height="90" rx="4" fill="#10B981" opacity="0.15"/>
    <circle cx="520" cy="230" r="16" fill="#10B981" opacity="0.3"/>
    <text x="520" y="234" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="14">06</text>
