    <rect x="28" y="394" width="140" height="28" rx="4" fill="#09090B"/>
    <text x="36" y="412" fill="#A855F7" font-family="system-ui, sans-serif" font-size="10" font-weight="700">6</text>
    <text x="52" y="412" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="7">分镜场景</text>
    <rect x="176" y="394" width="140" height="28" rx="4" fill="#09090B"/>
    <text x="184" y="412" fill="#EC4899" font-family="system-ui, sans-serif" font-size="10" font-weight="700">3-5</text>
    <text x="212" y="412" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="7">角色数量</text>
    <rect x="324" y="394" width="140" height="28" rx="4" fill="#09090B"/>
    <text x="332" y="412" fill="#10B981" font-family="system-ui, sans-serif" font-size="10" font-weight="700">1周</text>
    <text x="358" y="412" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="7">制作周期</text>
    <rect x="472" y="394" width="140" height="28" rx="4" fill="#09090B"/>
    <text x="480" y="412" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="10" font-weight="700">10x</text>
    <text x="508" y="412" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="7">效率提升</text>
  </g>

  <!-- 右侧卡片 - 漫剧数据 -->
  <g transform="translate(960, 100)" filter="url(#shadow2)">
    <rect width="200" height="180" rx="12" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">漫剧数据</text>
    <rect x="16" y="44" width="168" height="50" rx="6" fill="#09090B" stroke="#3F3F46" stroke-width="1"/>
    <text x="24" y="62" fill="#A855F7" font-family="system-ui, sans-serif" font-size="7">叙事完整度</text>
    <text x="24" y="78" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">92%</text>
    <rect x="16" y="100" width="80" height="24" rx="6" fill="url(#iconGrad)"/>
    <text x="56" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">生成</text>
    <rect x="104" y="100" width="80" height="24" rx="6" fill="#3F3F46"/>
    <text x="144" y="116" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="8">导出</text>
    <rect x="16" y="132" width="168" height="36" rx="6" fill="#18181B"/>
    <text x="24" y="148" fill="#7C3AED" font-family="system-ui, sans-serif" font-size="7" font-weight="600">AI漫剧工作流</text>
    <text x="24" y="160" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">从剧本到成片 1周</text>
  </g>

  <text x="600" y="580" text-anchor="middle" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">AI漫剧</text>
  <text x="600" y="610" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="14">AI叙事动画的完整制作工作流与分镜设计</text>
</svg>