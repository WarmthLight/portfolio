<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181B"/>
      <stop offset="50%" style="stop-color:#27272A"/>
      <stop offset="100%" style="stop-color:#3F3F46"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#A855F7" opacity="0.08"/>
  <circle cx="1050" cy="550" r="150" fill="#7C3AED" opacity="0.06"/>

  <!-- 应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)" filter="url(#shadow1)"/>
    <!-- 漫画分镜图标 -->
    <rect x="28" y="30" width="36" height="36" rx="4" fill="#fff" opacity="0.3"/>
    <rect x="70" y="30" width="36" height="36" rx="4" fill="#fff" opacity="0.2"/>
    <rect x="28" y="72" width="36" height="36" rx="4" fill="#fff" opacity="0.2"/>
    <rect x="70" y="72" width="36" height="36" rx="4" fill="#fff" opacity="0.3"/>
    <circle cx="46" cy="48" r="6" fill="#fff" opacity="0.6"/>
    <circle cx="88" cy="90" r="6" fill="#fff" opacity="0.6"/>
    <text x="70" y="135" text-anchor="middle" fill="#F3E8FF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">AI漫剧</text>
  </g>

