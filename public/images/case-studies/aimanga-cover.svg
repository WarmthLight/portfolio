    <text x="428" y="298" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">结局 - 故事收束</text>

    <!-- 制作时间线 -->
    <rect x="16" y="328" width="608" height="48" rx="6" fill="#27272A"/>
    <text x="28" y="348" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">制作时间线</text>
    <rect x="120" y="340" width="480" height="24" rx="4" fill="#09090B"/>
    <rect x="120" y="340" width="80" height="24" rx="4" fill="#A855F7" opacity="0.5"/>
    <rect x="208" y="340" width="120" height="24" rx="4" fill="#7C3AED" opacity="0.5"/>
    <rect x="336" y="340" width="160" height="24" rx="4" fill="#EC4899" opacity="0.5"/>
    <rect x="504" y="340" width="96" height="24" rx="4" fill="#10B981" opacity="0.5"/>
    <text x="148" y="356" fill="#fff" font-family="system-ui, sans-serif" font-size="6">剧本</text>
    <text x="256" y="356" fill="#fff" font-family="system-ui, sans-serif" font-size="6">角色设计</text>
    <text x="392" y="356" fill="#fff" font-family="system-ui, sans-serif" font-size="6">分镜生成</text>
    <text x="536" y="356" fill="#fff" font-family="system-ui, sans-serif" font-size="6">后期</text>

    <!-- 项目数据卡片 -->
