<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181B"/>
      <stop offset="50%" style="stop-color:#27272A"/>
      <stop offset="100%" style="stop-color:#3F3F46"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#F43F5E"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#EC4899" opacity="0.08"/>
  <circle cx="1050" cy="550" r="150" fill="#F43F5E" opacity="0.06"/>

  <!-- 应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)" filter="url(#shadow1)"/>
    <!-- 品牌播放图标 -->
    <rect x="35" y="35" width="70" height="50" rx="6" fill="#fff" opacity="0.2"/>
    <polygon points="55,45 55,75 80,60" fill="#fff" opacity="0.9"/>
    <rect x="35" y="92" width="70" height="8" rx="4" fill="#fff" opacity="0.3"/>
    <text x="70" y="135" text-anchor="middle" fill="#FCE7F3" font-family="system-ui, sans-serif" font-size="11" font-weight="600">BrandMotion</text>
  </g>

  <!-- 多平台视频展示 -->
  <g transform="translate(280, 50)" filter="url(#shadow2)">
    <rect width="640" height="440" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
    <!-- 标题栏 -->
    <rect width="640" height="32" rx="8" fill="#27272A"/>
    <rect y="24" width="640" height="8" fill="#27272A"/>
    <text x="16" y="22" fill="#EC4899" font-family="system-ui, sans-serif" font-size="10" font-weight="600">BrandMotion</text>
    <text x="130" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">抖音 9:16</text>
    <text x="210" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">B站 16:9</text>
    <text x="290" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">小红书 1:1</text>
    <!-- 抖音 9:16 竖版 -->
    <rect x="16" y="44" width="120" height="216" rx="6" fill="#09090B"/>
    <rect x="20" y="48" width="112" height="180" rx="4" fill="#EC4899" opacity="0.15"/>
    <polygon x="76" y="130" points="60,110 60,150 92,130" fill="#EC4899" opacity="0.6"/>
    <rect x="20" y="232" width="112" height="20" rx="4" fill="#27272A"/>
    <text x="76" y="246" text-anchor="middle" fill="#EC4899" font-family="system-ui, sans-serif" font-size="7" font-weight="600">抖音 9:16</text>
    <!-- B站 16:9 横版 -->
    <rect x="148" y="44" width="280" height="216" rx="6" fill="#09090B"/>
    <rect x="152" y="48" width="272" height="160" rx="4" fill="#3B82F6" opacity="0.15"/>
    <polygon points="280,118 280,158 312,138" fill="#3B82F6" opacity="0.6"/>
    <rect x="152" y="212" width="272" height="40" rx="4" fill="#27272A"/>
    <text x="288" y="230" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="7" font-weight="600">B站 16:9 横版</text>
    <text x="288" y="244" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">1920x1080 | 高清画质</text>
    <!-- 小红书 1:1 方版 -->
    <rect x="440" y="44" width="184" height="184" rx="6" fill="#09090B"/>
    <rect x="444" y="48" width="176" height="140" rx="4" fill="#F43F5E" opacity="0.15"/>
    <polygon points="524,108 524,148 556,128" fill="#F43F5E" opacity="0.6"/>
    <rect x="444" y="192" width="176" height="28" rx="4" fill="#27272A"/>
    <text x="532" y="210" text-anchor="middle" fill="#F43F5E" font-family="system-ui, sans-serif" font-size="7" font-weight="600">小红书 1:1</text>
    <!-- A/B测试 -->
    <rect x="16" y="276" width="304" height="80" rx="6" fill="#27272A"/>
    <text x="28" y="296" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">A/B测试结果</text>
    <rect x="28" y="306" width="132" height="36" rx="4" fill="#09090B"/>
    <text x="36" y="322" fill="#EC4899" font-family="system-ui, sans-serif" font-size="7">版本A - 情感叙事</text>
    <text x="36" y="336" fill="#10B981" font-family="system-ui, sans-serif" font-size="12" font-weight="700">3.2% CTR</text>
    <rect x="172" y="306" width="132" height="36" rx="4" fill="#09090B"/>
    <text x="180" y="322" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="7">版本B - 产品聚焦</text>
    <text x="180" y="336" fill="#10B981" font-family="system-ui, sans-serif" font-size="12" font-weight="700">4.8% CTR</text>
    <!-- 成本对比 -->
    <rect x="332" y="276" width="292" height="80" rx="6" fill="#27272A"/>
    <text x="344" y="296" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">成本对比</text>
    <rect x="344" y="306" width="268" height="36" rx="4" fill="#09090B"/>
    <rect x="344" y="306" width="60" height="36" rx="4" fill="#EF4444" opacity="0.4"/>
    <text x="352" y="322" fill="#EF4444" font-family="system-ui, sans-serif" font-size="7">传统</text>
    <text x="352" y="336" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="9" font-weight="700">¥50,000</text>
    <rect x="420" y="306" width="60" height="36" rx="4" fill="#10B981" opacity="0.4"/>
    <text x="428" y="322" fill="#10B981" font-family="system-ui, sans-serif" font-size="7">AI</text>
    <text x="428" y="336" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="9" font-weight="700">¥3,000</text>
    <text x="496" y="328" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="14" font-weight="700">-94%</text>
    <!-- 平台适配流程 -->
    <rect x="16" y="368" width="608" height="56" rx="6" fill="#27272A"/>
    <text x="28" y="388" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">适配流程</text>
    <rect x="28" y="396" width="100" height="20" rx="10" fill="#EC4899" opacity="0.3"/>
    <text x="78" y="410" text-anchor="middle" fill="#EC4899" font-family="system-ui, sans-serif" font-size="7">素材导入</text>
    <text x="140" y="410" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="156" y="396" width="100" height="20" rx="10" fill="#F43F5E" opacity="0.3"/>
    <text x="206" y="410" text-anchor="middle" fill="#F43F5E" font-family="system-ui, sans-serif" font-size="7">AI裁剪</text>
    <text x="268" y="410" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="284" y="396" width="100" height="20" rx="10" fill="#A855F7" opacity="0.3"/>
    <text x="334" y="410" text-anchor="middle" fill="#A855F7" font-family="system-ui, sans-serif" font-size="7">字幕生成</text>
    <text x="396" y="410" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="412" y="396" width="100" height="20" rx="10" fill="#06B6D4" opacity="0.3"/>
    <text x="462" y="410" text-anchor="middle" fill="#06B6D4" font-family="system-ui, sans-serif" font-size="7">多平台发布</text>
  </g>

  <!-- 右侧卡片 - 营销数据 -->
  <g transform="translate(960, 100)" filter="url(#shadow2)">
    <rect width="200" height="180" rx="12" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">营销数据</text>
    <rect x="16" y="44" width="168" height="50" rx="6" fill="#09090B" stroke="#3F3F46" stroke-width="1"/>
    <text x="24" y="62" fill="#EC4899" font-family="system-ui, sans-serif" font-size="7">ROI提升</text>
    <text x="24" y="78" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">+320%</text>
    <rect x="16" y="100" width="80" height="24" rx="6" fill="url(#iconGrad)"/>
    <text x="56" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">生成</text>
    <rect x="104" y="100" width="80" height="24" rx="6" fill="#3F3F46"/>
    <text x="144" y="116" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="8">导出</text>
    <rect x="16" y="132" width="168" height="36" rx="6" fill="#18181B"/>
    <text x="24" y="148" fill="#F43F5E" font-family="system-ui, sans-serif" font-size="7" font-weight="600">制作效率</text>
    <text x="24" y="160" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">3天完成传统2周工作量</text>
  </g>

  <text x="600" y="580" text-anchor="middle" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">BrandMotion</text>
  <text x="600" y="610" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="14">AI商业视频的多平台适配与高效营销工作流</text>
</svg>