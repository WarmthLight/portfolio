<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181B"/>
      <stop offset="50%" style="stop-color:#27272A"/>
      <stop offset="100%" style="stop-color:#3F3F46"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D946EF"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#D946EF" opacity="0.08"/>
  <circle cx="1050" cy="550" r="150" fill="#A855F7" opacity="0.06"/>

  <!-- 应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)" filter="url(#shadow1)"/>
    <rect x="30" y="35" width="80" height="60" rx="4" fill="#fff" opacity="0.15"/>
    <rect x="35" y="40" width="70" height="50" rx="2" fill="#fff" opacity="0.2"/>
    <circle cx="55" cy="55" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="75" cy="55" r="4" fill="#fff" opacity="0.8"/>
    <rect x="45" y="70" width="50" height="8" rx="2" fill="#fff" opacity="0.6"/>
    <text x="70" y="135" text-anchor="middle" fill="#F5D0FE" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PixelForge</text>
  </g>

  <!-- 桌面端界面 -->
  <g transform="translate(280, 50)" filter="url(#shadow2)">
    <rect width="640" height="440" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
    <!-- 标题栏 -->
    <rect width="640" height="32" rx="8" fill="#27272A"/>
    <rect y="24" width="640" height="8" fill="#27272A"/>
    <text x="16" y="22" fill="#D946EF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PixelForge</text>
    <text x="100" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">File</text>
    <text x="130" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">Edit</text>
    <text x="160" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">View</text>
    <text x="190" y="22" fill="#06B6D4" font-family="system-ui, sans-serif" font-size="9">AI</text>
    <text x="210" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">Export</text>
    <!-- 工具栏 -->
    <rect x="0" y="32" width="36" height="408" fill="#27272A"/>
    <rect x="8" y="44" width="20" height="20" rx="3" fill="#3F3F46"/>
    <rect x="8" y="72" width="20" height="20" rx="3" fill="#3F3F46"/>
    <rect x="8" y="100" width="20" height="20" rx="3" fill="#D946EF" opacity="0.8"/>
    <rect x="8" y="128" width="20" height="20" rx="3" fill="#3F3F46"/>
    <rect x="8" y="156" width="20" height="20" rx="3" fill="#3F3F46"/>
    <!-- 画布区域 -->
    <rect x="36" y="32" width="440" height="340" fill="#09090B"/>
    <!-- 角色 -->
    <rect x="200" y="120" width="60" height="80" rx="2" fill="#D946EF" opacity="0.3"/>
    <rect x="210" y="100" width="40" height="30" rx="2" fill="#F59E0B" opacity="0.6"/>
    <circle cx="222" cy="112" r="3" fill="#18181B"/>
    <circle cx="238" cy="112" r="3" fill="#18181B"/>
    <rect x="215" y="150" width="30" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="185" y="130" width="8" height="40" rx="2" fill="#E5E7EB" opacity="0.4"/>
    <rect x="265" y="130" width="8" height="40" rx="2" fill="#E5E7EB" opacity="0.4"/>
    <rect x="205" y="200" width="15" height="30" rx="2" fill="#3F3F46"/>
    <rect x="235" y="200" width="15" height="30" rx="2" fill="#3F3F46"/>
    <!-- 图层面板 -->
    <rect x="476" y="32" width="164" height="340" fill="#27272A"/>
    <text x="488" y="52" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="8">Layers</text>
    <rect x="484" y="60" width="148" height="24" rx="3" fill="#3F3F46"/>
    <rect x="490" y="66" width="16" height="12" rx="2" fill="#6B7280"/>
    <text x="512" y="76" fill="#E5E7EB" font-family="system-ui, sans-serif" font-size="7">Sword</text>
    <rect x="484" y="90" width="148" height="24" rx="3" fill="#D946EF" opacity="0.2"/>
    <rect x="490" y="96" width="16" height="12" rx="2" fill="#D946EF"/>
    <text x="512" y="106" fill="#F5D0FE" font-family="system-ui, sans-serif" font-size="7">Body</text>
    <rect x="484" y="120" width="148" height="24" rx="3" fill="#3F3F46"/>
    <rect x="490" y="126" width="16" height="12" rx="2" fill="#F59E0B"/>
    <text x="512" y="136" fill="#E5E7EB" font-family="system-ui, sans-serif" font-size="7">Head</text>
    <rect x="484" y="150" width="148" height="24" rx="3" fill="#3F3F46"/>
    <rect x="490" y="156" width="16" height="12" rx="2" fill="#6B7280"/>
    <text x="512" y="166" fill="#E5E7EB" font-family="system-ui, sans-serif" font-size="7">Legs</text>
    <!-- 底部资产栏 -->
    <rect x="36" y="372" width="604" height="68" fill="#27272A"/>
    <text x="48" y="392" fill="#52525B" font-family="system-ui, sans-serif" font-size="7">RECENT</text>
    <rect x="48" y="398" width="48" height="40" rx="4" fill="#3F3F46" stroke="#52525B" stroke-width="1"/>
    <rect x="56" y="406" width="32" height="24" rx="2" fill="#D946EF" opacity="0.4"/>
    <rect x="104" y="398" width="48" height="40" rx="4" fill="#3F3F46"/>
    <rect x="112" y="406" width="32" height="24" rx="2" fill="#A855F7" opacity="0.4"/>
    <rect x="160" y="398" width="48" height="40" rx="4" fill="#3F3F46"/>
    <rect x="168" y="406" width="32" height="24" rx="2" fill="#06B6D4" opacity="0.4"/>
    <rect x="216" y="398" width="48" height="40" rx="4" fill="#3F3F46"/>
    <rect x="224" y="406" width="32" height="24" rx="2" fill="#22C55E" opacity="0.4"/>
  </g>

  <!-- 右侧卡片 - AI生成 -->
  <g transform="translate(960, 100)" filter="url(#shadow2)">
    <rect width="200" height="180" rx="12" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">AI 资产生成</text>
    <rect x="16" y="44" width="168" height="50" rx="6" fill="#09090B" stroke="#3F3F46" stroke-width="1"/>
    <text x="24" y="62" fill="#06B6D4" font-family="system-ui, sans-serif" font-size="7">A pixel art warrior...</text>
    <rect x="16" y="100" width="80" height="24" rx="6" fill="url(#iconGrad)"/>
    <text x="56" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">生成</text>
    <rect x="104" y="100" width="80" height="24" rx="6" fill="#3F3F46"/>
    <text x="144" y="116" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="8">变体</text>
    <rect x="16" y="132" width="168" height="36" rx="6" fill="#18181B"/>
    <text x="24" y="148" fill="#06B6D4" font-family="system-ui, sans-serif" font-size="7" font-weight="600">Unity 插件</text>
    <text x="24" y="160" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">10K+ 下载</text>
  </g>

  <text x="600" y="580" text-anchor="middle" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">PixelForge</text>
  <text x="600" y="610" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="14">为独立开发者打造的智能美术工作流</text>
</svg>
