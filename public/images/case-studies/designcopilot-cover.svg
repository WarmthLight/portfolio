<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#3B82F6" opacity="0.08"/>
  <circle cx="1050" cy="550" r="150" fill="#1D4ED8" opacity="0.06"/>

  <!-- 左侧应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)" filter="url(#shadow1)"/>
    <!-- 设计工具图标 -->
    <rect x="30" y="30" width="80" height="65" rx="6" fill="#fff" opacity="0.15"/>
    <rect x="35" y="35" width="30" height="25" rx="4" fill="#fff" opacity="0.3"/>
    <rect x="70" y="35" width="35" height="25" rx="4" fill="#fff" opacity="0.25"/>
    <rect x="35" y="65" width="70" height="22" rx="4" fill="#fff" opacity="0.2"/>
