    <rect x="16" y="44" width="168" height="50" rx="6" fill="#0F172A" stroke="#3B82F6" stroke-width="1"/>
    <text x="24" y="62" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="7">设计周期缩短</text>
    <text x="24" y="78" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">-60%</text>
    <rect x="16" y="100" width="80" height="24" rx="6" fill="url(#iconGrad)"/>
    <text x="56" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">生成</text>
    <rect x="104" y="100" width="80" height="24" rx="6" fill="#3F3F46"/>
    <text x="144" y="116" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8">导出</text>
    <rect x="16" y="132" width="168" height="36" rx="6" fill="#0F172A"/>
    <text x="24" y="148" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="7" font-weight="600">设计工作流</text>
    <text x="24" y="160" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="6">从概念到交付 5天完成</text>
  </g>

  <!-- 右侧卡片 - 项目统计 -->
  <g transform="translate(960, 310)" filter="url(#shadow2)">
    <rect width="200" height="120" rx="12" fill="#1E3A5F" stroke="#1D4ED8" stroke-width="1" opacity="0.8"/>
    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">项目统计</text>
    <rect x="16" y="44" width="76" height="60" rx="6" fill="#0F172A"/>
    <text x="54" y="70" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="18" font-weight="700">24</text>
    <text x="54" y="88" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="6">设计页面</text>
    <rect x="100" y="44" width="76" height="60" rx="6" fill="#0F172A"/>
    <text x="138" y="70" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="18" font-weight="700">156</text>
    <text x="138" y="88" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="6">UI组件</text>
  </g>

  <!-- 底部标题 -->
  <text x="600" y="580" text-anchor="middle" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">DesignCopilot</text>
  <text x="600" y="610" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">将AI工具深度融入专业UI设计流程</text>
</svg>
