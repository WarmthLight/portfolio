    <rect x="340" y="266" width="272" height="20" rx="4" fill="#0F172A"/>
    <rect x="340" y="266" width="68" height="20" rx="4" fill="#10B981" opacity="0.4"/>
    <text x="348" y="280" fill="#10B981" font-family="system-ui, sans-serif" font-size="7">AI辅助 5天</text>
    <text x="570" y="256" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="12" font-weight="700">-64%</text>

