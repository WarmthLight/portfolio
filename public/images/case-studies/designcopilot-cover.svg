  <g transform="translate(280, 50)" filter="url(#shadow2)">
    <rect width="640" height="440" rx="8" fill="#0F172A" stroke="#1E3A5F" stroke-width="1"/>
    <!-- 标题栏 -->
    <rect width="640" height="32" rx="8" fill="#1E3A5F"/>
    <rect y="24" width="640" height="8" fill="#1E3A5F"/>
    <text x="16" y="22" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="10" font-weight="600">DesignCopilot</text>
    <text x="130" y="22" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">流程</text>
    <text x="170" y="22" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">组件库</text>
    <text x="230" y="22" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">AI辅助</text>
    <text x="290" y="22" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">导出</text>

    <!-- 设计流程步骤 -->
    <rect x="16" y="44" width="608" height="60" rx="6" fill="#1E3A5F"/>
    <text x="28" y="64" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">设计流程</text>
    <rect x="28" y="72" width="80" height="24" rx="12" fill="#3B82F6" opacity="0.4"/>
    <text x="68" y="88" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="7" font-weight="600">概念</text>
    <text x="118" y="88" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="130" y="72" width="80" height="24" rx="12" fill="#1D4ED8" opacity="0.4"/>
    <text x="170" y="88" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="7" font-weight="600">原型</text>
    <text x="220" y="88" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="232" y="72" width="100" height="24" rx="12" fill="#10B981" opacity="0.4"/>
    <text x="282" y="88" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="7" font-weight="600">高保真</text>
    <text x="342" y="88" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="354" y="72" width="80" height="24" rx="12" fill="#F59E0B" opacity="0.4"/>
    <text x="394" y="88" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="7" font-weight="600">交付</text>
