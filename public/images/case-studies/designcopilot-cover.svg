    <text x="340" y="136" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">组件复用率</text>
    <rect x="340" y="144" width="120" height="44" rx="4" fill="#0F172A"/>
    <text x="348" y="162" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="7">设计系统组件</text>
    <text x="348" y="180" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">87%</text>
    <rect x="472" y="144" width="140" height="44" rx="4" fill="#0F172A"/>
