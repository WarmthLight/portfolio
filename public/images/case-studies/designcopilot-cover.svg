    <rect x="220" y="338" width="180" height="76" rx="4" fill="#0F172A" stroke="#1D4ED8" stroke-width="1"/>
    <rect x="228" y="346" width="70" height="30" rx="4" fill="#1D4ED8" opacity="0.3"/>
    <rect x="306" y="346" width="84" height="30" rx="4" fill="#3B82F6" opacity="0.2"/>
    <text x="310" y="396" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="6">布局 / 导航 / 图表</text>
    <rect x="412" y="338" width="196" height="76" rx="4" fill="#0F172A" stroke="#10B981" stroke-width="1"/>
    <rect x="420" y="346" width="60" height="30" rx="4" fill="#10B981" opacity="0.3"/>
    <rect x="488" y="346" width="60" height="30" rx="4" fill="#F59E0B" opacity="0.3"/>
    <rect x="556" y="346" width="40" height="30" rx="4" fill="#EC4899" opacity="0.3"/>
    <text x="510" y="396" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="6">图标 / 动效 / 主题</text>
