    <text x="28" y="136" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">设计稿预览</text>
    <rect x="24" y="144" width="128" height="80" rx="4" fill="#1E3A5F"/>
    <rect x="32" y="152" width="60" height="10" rx="2" fill="#3B82F6" opacity="0.4"/>
    <rect x="32" y="166" width="100" height="6" rx="2" fill="#94A3B8" opacity="0.2"/>
    <rect x="32" y="176" width="80" height="6" rx="2" fill="#94A3B8" opacity="0.15"/>
    <rect x="32" y="192" width="40" height="16" rx="4" fill="#3B82F6" opacity="0.3"/>
    <rect x="160" y="144" width="140" height="80" rx="4" fill="#1E3A5F"/>
    <rect x="168" y="152" width="70" height="10" rx="2" fill="#1D4ED8" opacity="0.4"/>
    <rect x="168" y="166" width="120" height="6" rx="2" fill="#94A3B8" opacity="0.2"/>
    <rect x="168" y="176" width="90" height="6" rx="2" fill="#94A3B8" opacity="0.15"/>
    <rect x="168" y="192" width="50" height="16" rx="4" fill="#1D4ED8" opacity="0.3"/>
    <rect x="24" y="230" width="280" height="56" rx="4" fill="#1E3A5F"/>
    <rect x="32" y="238" width="120" height="10" rx="2" fill="#3B82F6" opacity="0.3"/>
    <rect x="32" y="252" width="260" height="6" rx="2" fill="#94A3B8" opacity="0.15"/>
    <rect x="32" y="262" width="200" height="6" rx="2" fill="#94A3B8" opacity="0.1"/>
