<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="50%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#5EEAD4" opacity="0.12"/>
  <circle cx="1050" cy="550" r="150" fill="#A5F3FC" opacity="0.08"/>

  <!-- 应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="#0D9488" filter="url(#shadow1)"/>
    <path d="M70 25 C70 25 115 50 115 75 C115 95 95 115 70 115 C45 115 25 95 25 75 C25 50 70 25 70 25" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="70" cy="75" r="18" fill="#fff" opacity="0.3"/>
    <circle cx="70" cy="75" r="9" fill="#fff"/>
    <text x="70" y="135" text-anchor="middle" fill="#CCFBF1" font-family="system-ui, sans-serif" font-size="11" font-weight="600">TripWise</text>
  </g>

  <!-- 手机界面 -->
  <g transform="translate(300, 60)" filter="url(#shadow2)">
    <rect width="220" height="380" rx="20" fill="#1F2937"/>
    <rect x="6" y="6" width="208" height="368" rx="16" fill="#FFFFFF"/>
    <!-- 状态栏 -->
    <rect x="6" y="6" width="208" height="36" rx="16" fill="url(#bg)"/>
    <text x="18" y="30" fill="#fff" font-family="system-ui, sans-serif" font-size="9">9:41</text>
    <!-- 搜索栏 -->
    <rect x="12" y="50" width="196" height="24" rx="12" fill="#F3F4F6"/>
    <text x="24" y="66" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="8">搜索目的地...</text>
    <!-- 分类标签 -->
    <rect x="12" y="80" width="32" height="14" rx="7" fill="#0D9488"/>
    <text x="28" y="90" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="6">全部</text>
    <rect x="48" y="80" width="32" height="14" rx="7" fill="#F3F4F6"/>
    <text x="64" y="90" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">海岛</text>
    <rect x="84" y="80" width="32" height="14" rx="7" fill="#F3F4F6"/>
    <text x="100" y="90" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="6">城市</text>
    <!-- 推荐卡片 -->
    <rect x="12" y="100" width="196" height="80" rx="8" fill="url(#bg)"/>
    <text x="20" y="116" fill="#fff" font-family="system-ui, sans-serif" font-size="6" opacity="0.8">AI推荐</text>
    <text x="20" y="134" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="700">日本京都</text>
    <text x="20" y="148" fill="#fff" font-family="system-ui, sans-serif" font-size="6" opacity="0.8">千年古都，春日樱花季</text>
    <text x="20" y="172" fill="#fff" font-family="system-ui, sans-serif" font-size="6" opacity="0.7">1.2万人收藏</text>
    <!-- 推荐列表 -->
    <text x="12" y="194" fill="#111827" font-family="system-ui, sans-serif" font-size="7" font-weight="700">为你推荐</text>
    <rect x="12" y="200" width="56" height="36" rx="6" fill="#FEF3C7"/>
    <text x="40" y="222" text-anchor="middle" fill="#92400E" font-family="system-ui, sans-serif" font-size="6">清迈</text>
    <rect x="74" y="200" width="56" height="36" rx="6" fill="#DBEAFE"/>
    <text x="102" y="222" text-anchor="middle" fill="#1E40AF" font-family="system-ui, sans-serif" font-size="6">冰岛</text>
    <rect x="136" y="200" width="56" height="36" rx="6" fill="#D1FAE5"/>
    <text x="164" y="222" text-anchor="middle" fill="#065F46" font-family="system-ui, sans-serif" font-size="6">巴厘岛</text>
    <!-- 底部导航 -->
    <rect x="18" y="340" width="184" height="28" rx="14" fill="#FFFFFF" stroke="#F3F4F6" stroke-width="1"/>
    <text x="42" y="358" text-anchor="middle" fill="#0D9488" font-family="system-ui, sans-serif" font-size="6">探索</text>
    <text x="82" y="358" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">规划</text>
    <text x="138" y="358" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">旅行</text>
    <text x="178" y="358" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">我的</text>
  </g>

  <!-- 右侧卡片 -->
  <g transform="translate(600, 80)" filter="url(#shadow2)">
    <rect width="520" height="180" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="32" fill="#111827" font-family="system-ui, sans-serif" font-size="13" font-weight="700">AI 行程规划</text>
    <rect x="24" y="44" width="472" height="44" rx="8" fill="#F0FDFA" stroke="#0D9488" stroke-width="1"/>
    <text x="36" y="62" fill="#0D9488" font-family="system-ui, sans-serif" font-size="9" font-weight="600">京都5日游</text>
    <text x="36" y="78" fill="#6B7280" font-family="system-ui, sans-serif" font-size="8">AI 生成 · 可自由编辑 · 考虑交通衔接</text>
    <circle cx="470" cy="62" r="14" fill="#0D9488" opacity="0.2"/>
    <text x="470" y="67" text-anchor="middle" fill="#0D9488" font-family="system-ui, sans-serif" font-size="10">⚡</text>
    <text x="24" y="108" fill="#111827" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Day 1 · 行程</text>
    <circle cx="38" cy="126" r="7" fill="#0D9488"/>
    <text x="38" y="130" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="6">1</text>
    <text x="52" y="130" fill="#111827" font-family="system-ui, sans-serif" font-size="8">伏见稻荷大社</text>
    <text x="220" y="130" fill="#6B7280" font-family="system-ui, sans-serif" font-size="7">09:00-12:00</text>
    <circle cx="38" cy="150" r="7" fill="#06B6D4"/>
    <text x="38" y="154" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="6">2</text>
    <text x="52" y="154" fill="#111827" font-family="system-ui, sans-serif" font-size="8">清水寺</text>
    <text x="220" y="154" fill="#6B7280" font-family="system-ui, sans-serif" font-size="7">14:00-17:00</text>
  </g>

  <g transform="translate(600, 300)" filter="url(#shadow2)">
    <rect width="520" height="240" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="32" fill="#111827" font-family="system-ui, sans-serif" font-size="13" font-weight="700">旅行中 · 实时导航</text>
    <rect x="24" y="44" width="472" height="40" rx="8" fill="#0D9488"/>
    <text x="36" y="60" fill="#fff" font-family="system-ui, sans-serif" font-size="7" opacity="0.8">当前位置</text>
    <text x="36" y="76" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="700">清水寺</text>
    <circle cx="470" cy="60" r="12" fill="#fff" opacity="0.2"/>
    <text x="470" y="65" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9">📍</text>
    <rect x="24" y="92" width="472" height="40" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
    <text x="36" y="108" fill="#92400E" font-family="system-ui, sans-serif" font-size="8" font-weight="600">下一站</text>
    <text x="36" y="122" fill="#78350F" font-family="system-ui, sans-serif" font-size="8">二年坂散步 · 步行12分钟</text>
    <rect x="24" y="140" width="152" height="80" rx="10" fill="#ECFDF5"/>
    <text x="100" y="184" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="10" font-weight="600">✓ 已到达</text>
    <rect x="184" y="140" width="152" height="80" rx="10" fill="#FFF7ED"/>
    <text x="260" y="184" text-anchor="middle" fill="#EA580C" font-family="system-ui, sans-serif" font-size="10" font-weight="600">☕ 去用餐</text>
    <rect x="344" y="140" width="152" height="80" rx="10" fill="#F3F4F6"/>
    <text x="420" y="184" text-anchor="middle" fill="#6B7280" font-family="system-ui, sans-serif" font-size="10" font-weight="600">❓ 需要帮助</text>
  </g>

  <text x="600" y="620" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="36" font-weight="700">TripWise</text>
  <text x="600" y="650" text-anchor="middle" fill="#CCFBF1" font-family="system-ui, sans-serif" font-size="16">用 AI 重新定义旅行规划体验</text>
</svg>
