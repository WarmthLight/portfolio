<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181B"/>
      <stop offset="50%" style="stop-color:#27272A"/>
      <stop offset="100%" style="stop-color:#3F3F46"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#10B981" opacity="0.08"/>
  <circle cx="1050" cy="550" r="150" fill="#059669" opacity="0.06"/>

  <!-- 应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)" filter="url(#shadow1)"/>
    <!-- 3D模型图标 -->
    <polygon points="70,30 110,55 110,85 70,110 30,85 30,55" fill="#fff" opacity="0.2" stroke="#fff" stroke-opacity="0.4" stroke-width="1.5"/>
    <polygon points="70,40 100,58 100,82 70,100 40,82 40,58" fill="#fff" opacity="0.15"/>
    <line x1="70" y1="30" x2="70" y2="100" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="30" y1="55" x2="100" y2="82" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="110" y1="55" x2="40" y2="82" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="70" y="135" text-anchor="middle" fill="#D1FAE5" font-family="system-ui, sans-serif" font-size="11" font-weight="600">AssetForge</text>
  </g>

  <!-- 3D资产生成界面 -->
  <g transform="translate(280, 50)" filter="url(#shadow2)">
    <rect width="640" height="440" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
    <!-- 标题栏 -->
    <rect width="640" height="32" rx="8" fill="#27272A"/>
    <rect y="24" width="640" height="8" fill="#27272A"/>
    <text x="16" y="22" fill="#10B981" font-family="system-ui, sans-serif" font-size="10" font-weight="600">AssetForge</text>
    <text x="120" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">3D模型</text>
    <text x="190" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">纹理</text>
    <text x="230" y="22" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="9">资产包</text>
    <!-- 3D模型展示区 -->
    <rect x="16" y="44" width="280" height="200" rx="6" fill="#09090B"/>
    <polygon points="156,80 220,120 220,180 156,220 92,180 92,120" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
    <polygon points="156,100 200,125 200,170 156,195 112,170 112,125" fill="#059669" opacity="0.2"/>
    <circle cx="156" cy="150" r="8" fill="#10B981" opacity="0.5"/>
    <text x="156" y="154" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8">3D</text>
    <rect x="24" y="220" width="264" height="16" rx="4" fill="#27272A"/>
    <text x="32" y="232" fill="#10B981" font-family="system-ui, sans-serif" font-size="7" font-weight="600">游戏角色 - 战士模型</text>
    <!-- 纹理生成 -->
    <rect x="308" y="44" width="316" height="200" rx="6" fill="#27272A"/>
    <text x="320" y="64" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">纹理生成</text>
    <rect x="320" y="74" width="140" height="80" rx="4" fill="#09090B"/>
    <rect x="324" y="78" width="60" height="36" rx="3" fill="#10B981" opacity="0.2"/>
    <rect x="388" y="78" width="60" height="36" rx="3" fill="#059669" opacity="0.2"/>
    <rect x="324" y="118" width="60" height="28" rx="3" fill="#06B6D4" opacity="0.2"/>
    <rect x="388" y="118" width="60" height="28" rx="3" fill="#3B82F6" opacity="0.2"/>
    <rect x="472" y="74" width="140" height="80" rx="4" fill="#09090B"/>
    <text x="480" y="94" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">材质参数</text>
    <rect x="480" y="100" width="120" height="12" rx="3" fill="#3F3F46"/>
    <rect x="480" y="100" width="80" height="12" rx="3" fill="#10B981" opacity="0.5"/>
    <rect x="480" y="118" width="120" height="12" rx="3" fill="#3F3F46"/>
    <rect x="480" y="118" width="96" height="12" rx="3" fill="#059669" opacity="0.5"/>
    <rect x="480" y="136" width="120" height="12" rx="3" fill="#3F3F46"/>
    <rect x="480" y="136" width="60" height="12" rx="3" fill="#06B6D4" opacity="0.5"/>
    <!-- 场景资产包 -->
    <rect x="16" y="256" width="608" height="80" rx="6" fill="#27272A"/>
    <text x="28" y="276" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">场景资产包</text>
    <rect x="28" y="286" width="120" height="36" rx="4" fill="#09090B"/>
    <rect x="32" y="290" width="112" height="16" rx="3" fill="#10B981" opacity="0.2"/>
    <text x="36" y="314" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">森林场景 | 12资产</text>
    <rect x="156" y="286" width="120" height="36" rx="4" fill="#09090B"/>
    <rect x="160" y="290" width="112" height="16" rx="3" fill="#059669" opacity="0.2"/>
    <text x="164" y="314" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">城市街道 | 18资产</text>
    <rect x="284" y="286" width="120" height="36" rx="4" fill="#09090B"/>
    <rect x="288" y="290" width="112" height="16" rx="3" fill="#06B6D4" opacity="0.2"/>
    <text x="292" y="314" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">室内场景 | 15资产</text>
    <rect x="412" y="286" width="120" height="36" rx="4" fill="#09090B"/>
    <rect x="416" y="290" width="112" height="16" rx="3" fill="#A855F7" opacity="0.2"/>
    <text x="420" y="314" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">科幻场景 | 20资产</text>
    <rect x="540" y="286" width="80" height="36" rx="4" fill="#09090B"/>
    <text x="552" y="308" fill="#10B981" font-family="system-ui, sans-serif" font-size="8" font-weight="700">65+</text>
    <text x="552" y="318" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">总资产</text>
    <!-- 工具选型 -->
    <rect x="16" y="348" width="608" height="80" rx="6" fill="#27272A"/>
    <text x="28" y="368" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">工具选型对比</text>
    <rect x="28" y="378" width="180" height="40" rx="4" fill="#09090B"/>
    <text x="36" y="396" fill="#10B981" font-family="system-ui, sans-serif" font-size="8" font-weight="600">Meshy</text>
    <text x="36" y="410" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">文本→3D | 质量高</text>
    <rect x="216" y="378" width="180" height="40" rx="4" fill="#09090B"/>
    <text x="224" y="396" fill="#059669" font-family="system-ui, sans-serif" font-size="8" font-weight="600">Tripo3D</text>
    <text x="224" y="410" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">图片→3D | 速度快</text>
    <rect x="404" y="378" width="180" height="40" rx="4" fill="#09090B"/>
    <text x="412" y="396" fill="#06B6D4" font-family="system-ui, sans-serif" font-size="8" font-weight="600">Rodin</text>
    <text x="412" y="410" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">高精度 | 游戏级</text>
  </g>

  <!-- 右侧卡片 - 资产效率 -->
  <g transform="translate(960, 100)" filter="url(#shadow2)">
    <rect width="200" height="180" rx="12" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">资产效率</text>
    <rect x="16" y="44" width="168" height="50" rx="6" fill="#09090B" stroke="#3F3F46" stroke-width="1"/>
    <text x="24" y="62" fill="#10B981" font-family="system-ui, sans-serif" font-size="7">成本节省</text>
    <text x="24" y="78" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">-70%</text>
    <rect x="16" y="100" width="80" height="24" rx="6" fill="url(#iconGrad)"/>
    <text x="56" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">生成</text>
    <rect x="104" y="100" width="80" height="24" rx="6" fill="#3F3F46"/>
    <text x="144" y="116" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="8">导出</text>
    <rect x="16" y="132" width="168" height="36" rx="6" fill="#18181B"/>
    <text x="24" y="148" fill="#059669" font-family="system-ui, sans-serif" font-size="7" font-weight="600">资产创建流</text>
    <text x="24" y="160" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="6">从概念到可用资产 30分钟</text>
  </g>

  <text x="600" y="580" text-anchor="middle" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">AssetForge</text>
  <text x="600" y="610" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="14">AI驱动的游戏资产创作与3D模型生成工作流</text>
</svg>