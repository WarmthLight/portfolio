    <rect width="200" height="120" rx="12" fill="#1F2937" stroke="#D97706" stroke-width="1" opacity="0.8"/>
    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">技术栈</text>
    <rect x="16" y="44" width="76" height="60" rx="6" fill="#111827"/>
    <text x="54" y="70" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Unity</text>
    <text x="54" y="88" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">引擎</text>
    <rect x="100" y="44" width="76" height="60" rx="6" fill="#111827"/>
    <text x="138" y="70" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="14" font-weight="700">C#</text>
    <text x="138" y="88" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">语言</text>
  </g>

  <!-- 底部标题 -->
  <text x="600" y="580" text-anchor="middle" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="32" font-weight="700">GameForge</text>
  <text x="600" y="610" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="14">AI赋能游戏开发全流程的实践探索</text>
</svg>
