    <text x="110" y="22" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9">流程</text>
    <text x="150" y="22" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9">Demo</text>
    <text x="190" y="22" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9">资产</text>
    <text x="230" y="22" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9">发布</text>

    <!-- 游戏开发流程 -->
