    <text x="155" y="86" text-anchor="middle" fill="#D97706" font-family="system-ui, sans-serif" font-size="7" font-weight="600">原型</text>
    <text x="200" y="86" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="212" y="72" width="70" height="20" rx="10" fill="#10B981" opacity="0.4"/>
    <text x="247" y="86" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="7" font-weight="600">资产</text>
    <text x="292" y="86" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="304" y="72" width="70" height="20" rx="10" fill="#3B82F6" opacity="0.4"/>
    <text x="339" y="86" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="7" font-weight="600">关卡</text>
    <text x="384" y="86" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">→</text>
    <rect x="396" y="72" width="70" height="20" rx="10" fill="#EC4899" opacity="0.4"/>
    <text x="431" y="86" text-anchor="middle" fill="#EC4899" font-family="system-ui, sans-serif" font-size="7" font-weight="600">发布</text>
