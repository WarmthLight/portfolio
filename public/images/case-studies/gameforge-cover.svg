<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="50%" style="stop-color:#1F2937"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="#F59E0B" opacity="0.08"/>
  <circle cx="1050" cy="550" r="150" fill="#D97706" opacity="0.06"/>

  <!-- 左侧应用图标 -->
  <g transform="translate(80, 200)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)" filter="url(#shadow1)"/>
    <!-- 游戏控制器图标 -->
    <rect x="30" y="40" width="80" height="55" rx="20" fill="#fff" opacity="0.2"/>
    <circle cx="50" cy="60" r="6" fill="#fff" opacity="0.6"/>
    <rect x="47" y="50" width="6" height="20" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="40" y="57" width="20" height="6" rx="2" fill="#fff" opacity="0.5"/>
    <circle cx="88" cy="55" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="98" cy="65" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="78" cy="65" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="88" cy="75" r="3" fill="#fff" opacity="0.8"/>
