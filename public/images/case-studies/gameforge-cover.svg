    <text x="98" y="388" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="14" font-weight="700">5</text>
    <text x="98" y="402" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">游戏关卡</text>
    <rect x="180" y="368" width="140" height="40" rx="4" fill="#111827"/>
    <text x="250" y="388" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="14" font-weight="700">30+</text>
    <text x="250" y="402" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">AI生成资产</text>
    <rect x="332" y="368" width="140" height="40" rx="4" fill="#111827"/>
    <text x="402" y="388" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="14" font-weight="700">1200+</text>
    <text x="402" y="402" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">代码行数</text>
    <rect x="484" y="368" width="128" height="40" rx="4" fill="#111827"/>
    <text x="548" y="388" text-anchor="middle" fill="#EC4899" font-family="system-ui, sans-serif" font-size="14" font-weight="700">60fps</text>
    <text x="548" y="402" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">运行帧率</text>
