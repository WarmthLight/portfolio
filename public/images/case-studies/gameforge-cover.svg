    <text x="16" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">开发进度</text>
    <rect x="16" y="44" width="168" height="50" rx="6" fill="#111827" stroke="#F59E0B" stroke-width="1"/>
    <text x="24" y="62" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="7">开发效率提升</text>
    <text x="24" y="78" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">8x</text>
    <rect x="16" y="100" width="80" height="24" rx="6" fill="url(#iconGrad)"/>
    <text x="56" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">运行</text>
    <rect x="104" y="100" width="80" height="24" rx="6" fill="#374151"/>
    <text x="144" y="116" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="8">导出</text>
    <rect x="16" y="132" width="168" height="36" rx="6" fill="#111827"/>
    <text x="24" y="148" fill="#D97706" font-family="system-ui, sans-serif" font-size="7" font-weight="600">游戏工作流</text>
    <text x="24" y="160" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">从概念到可玩Demo 2周</text>
  </g>

