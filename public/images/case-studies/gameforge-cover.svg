    <text x="28" y="64" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">游戏开发流程</text>
    <rect x="28" y="72" width="70" height="20" rx="10" fill="#F59E0B" opacity="0.4"/>
    <text x="63" y="86" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="7" font-weight="600">概念</text>
    <text x="108" y="86" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">→</text>
