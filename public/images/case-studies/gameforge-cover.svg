    <text x="424" y="132" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="8" font-weight="600">开发效率</text>
    <rect x="424" y="140" width="92" height="60" rx="4" fill="#111827"/>
    <text x="470" y="168" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="18" font-weight="700">2周</text>
    <text x="470" y="186" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="6">AI辅助周期</text>
    <rect x="524" y="140" width="92" height="60" rx="4" fill="#111827"/>
